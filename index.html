<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Fixed Final Padlet</title>
    <style>
        :root { --f-blue: #18a0fb; --f-red: #ff4d4f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f3f4f6; font-family: sans-serif; overflow: auto; }
        #canvas { width: 5000px; height: 5000px; position: relative; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 40px 40px; user-select: none; }

        /* 포스트잇 기본 스타일 */
        .note { 
            position: absolute; display: flex; flex-direction: column; 
            padding: 15px; border-radius: 15px; background: white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid transparent;
            min-width: 200px; min-height: 150px; box-sizing: border-box; z-index: 10;
        }
        .note.selected { border-color: var(--f-blue); z-index: 1000 !important; }

        /* 상단 컨트롤바 (가로로 길게) */
        .note-controls { 
            position: absolute; top: -65px; left: 50%; transform: translateX(-50%); 
            display: none; gap: 20px; background: rgba(30,30,30,0.9); 
            padding: 10px 25px; border-radius: 15px; align-items: center; white-space: nowrap;
        }
        .note.selected .note-controls { display: flex; }
        .control-item { color: white; cursor: pointer; font-size: 12px; font-weight: bold; text-align: center; }

        /* 이미지 및 텍스트 */
        .img-area img { width: 100%; border-radius: 8px; pointer-events: none; }
        .note textarea { 
            width: 100%; flex-grow: 1; border: none; resize: none; outline: none; 
            background: transparent; font-size: 18px; margin-top: 10px; pointer-events: none; 
        }
        .note.editing textarea { pointer-events: auto; }

        /* 리사이저 핸들 (우측 하단) */
        .resizer { 
            position: absolute; width: 20px; height: 20px; 
            right: 0; bottom: 0; cursor: nwse-resize; background: transparent; 
        }

        /* 이름 툴바 */
        #toolbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; background: white; padding: 10px 20px; border-radius: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; gap: 15px; align-items: center; }
        #add-note { background: #111; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="name-display" style="font-weight: bold;">Guest</div>
    <button id="add-note">+ 새 메모</button>
</div>
<div id="canvas"></div>
<input type="file" id="file-input" style="display:none">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCX4hr8AauLtShugeHdogIa9WlKG1GeLDA",
      authDomain: "japan-travel-b6597.firebaseapp.com",
      databaseURL: "https://japan-travel-b6597-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "japan-travel-b6597",
      storageBucket: "japan-travel-b6597.firebasestorage.app",
      messagingSenderId: "207320927993",
      appId: "1:207320927993:web:df014223249603767a1c28",
      measurementId: "G-QTGGD2L5RC"
    };


    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const notesRef = ref(db, 'notes');
    const myId = Math.random().toString(36).substring(7);
    let myName = localStorage.getItem('padlet_name') || "익명";

    let activeId = null;
    let isMoving = false;
    let isResizing = false;
    let startX, startY, startW, startH, startL, startT;

    // --- 핵심 로직: 전역 마우스 이벤트 ---
    window.addEventListener('mousedown', (e) => {
        const note = e.target.closest('.note');
        if (!note) {
            document.querySelectorAll('.note').forEach(n => n.classList.remove('selected'));
            activeId = null;
            return;
        }

        activeId = note.dataset.id;
        document.querySelectorAll('.note').forEach(n => n.classList.remove('selected'));
        note.classList.add('selected');

        if (e.target.classList.contains('resizer')) {
            isResizing = true;
        } else if (!note.classList.contains('editing') && !e.target.closest('.note-controls')) {
            isMoving = true;
        }

        startX = e.clientX; startY = e.clientY;
        startL = note.offsetLeft; startT = note.offsetTop;
        startW = note.offsetWidth; startH = note.offsetHeight;
        
        if (isMoving || isResizing) {
            note.dataset.interact = "true";
            e.preventDefault(); 
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!activeId) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if (isMoving) {
            update(ref(db, `notes/${activeId}`), { x: startL + dx, y: startT + dy });
        } else if (isResizing) {
            update(ref(db, `notes/${activeId}`), { w: Math.max(200, startW + dx), h: Math.max(150, startH + dy) });
        }
    });

    window.addEventListener('mouseup', () => {
        if (activeId) {
            const el = document.querySelector(`.note[data-id="${activeId}"]`);
            if (el) el.dataset.interact = "false";
        }
        isMoving = false;
        isResizing = false;
    });

    // --- 렌더링 함수 (중복 생성 방지) ---
    function renderNote(id, data) {
        let note = document.querySelector(`.note[data-id="${id}"]`);
        
        if (!note) {
            note = document.createElement('div');
            note.className = 'note';
            note.dataset.id = id;
            note.innerHTML = `
                <div class="note-controls">
                    <div class="control-item del-btn">🗑️ 삭제</div>
                    <div class="control-item img-btn">🖼️ 사진</div>
                </div>
                <div class="img-area"></div>
                <textarea></textarea>
                <div class="author" style="font-size:10px; color:#aaa; margin-top:5px;">BY ${data.author}</div>
                <div class="resizer"></div>
            `;
            document.getElementById('canvas').appendChild(note);

            // 버튼 이벤트
            note.querySelector('.del-btn').onclick = () => remove(ref(db, `notes/${id}`));
            note.querySelector('.img-btn').onclick = () => { window.uploadTarget = id; document.getElementById('file-input').click(); };
            
            // 텍스트 편집
            note.ondblclick = () => { note.classList.add('editing'); note.querySelector('textarea').focus(); };
            note.querySelector('textarea').onblur = () => {
                note.classList.remove('editing');
                update(ref(db, `notes/${id}`), { text: note.querySelector('textarea').value });
            };
        }

        // 드래그 중에는 외부 업데이트 무시 (본인 드래그 보호)
        if (note.dataset.interact === "true") return;

        note.style.left = data.x + 'px';
        note.style.top = data.y + 'px';
        note.style.width = data.w + 'px';
        note.style.height = data.h + 'px';
        note.style.backgroundColor = data.color || '#fff';
        note.querySelector('textarea').value = data.text || "";
        if (data.img) {
            note.querySelector('.img-area').innerHTML = `<img src="${data.img}">`;
        }
    }

    // 사진 처리
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => update(ref(db, `notes/${window.uploadTarget}`), { img: ev.target.result });
        reader.readAsDataURL(file);
    };

    // 메모 추가
    document.getElementById('add-note').onclick = () => {
        push(notesRef, { x: 100, y: 100, w: 250, h: 200, text: "", author: myName });
    };

    onChildAdded(notesRef, s => renderNote(s.key, s.val()));
    onChildChanged(notesRef, s => renderNote(s.key, s.val()));
    onChildRemoved(notesRef, s => document.querySelector(`.note[data-id="${s.key}"]`)?.remove());
</script>
</body>
</html>
