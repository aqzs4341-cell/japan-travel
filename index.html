<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Professional Board - Final Fix</title>
    <style>
        :root { --f-blue: #18a0fb; --f-red: #ff4d4f; --bg-gray: #f3f4f6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-gray); font-family: 'Pretendard', sans-serif; overflow: auto; }
        
        /* [중요] 드래그 시 파란색으로 긁히는 현상 방지 */
        #canvas { 
            width: 5000px; height: 5000px; 
            background-image: radial-gradient(#d1d1d1 1.2px, transparent 1.2px); 
            background-size: 40px 40px; position: relative; 
            user-select: none; -webkit-user-select: none; 
        }
        
        /* 모달 오버레이 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.25); min-width: 320px; }

        /* 상단 이름 툴바 */
        #toolbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; gap: 12px; background: rgba(255, 255, 255, 0.8); padding: 8px 16px; border-radius: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); backdrop-filter: blur(10px); align-items: center; border: 1px solid rgba(255,255,255,0.5); }
        #name-display-area { font-size: 14px; color: #333; padding: 0 15px; border-right: 1px solid #ddd; cursor: pointer; font-weight: 800; }
        #add-note { background: #333; color: white; border: none; padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        #add-note:hover { background: #000; transform: scale(1.05); }

        /* 포스트잇 */
        .note { 
            position: absolute; display: flex; flex-direction: column; 
            padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            background: white; border: 2px solid transparent; cursor: grab; 
            min-width: 240px; min-height: 180px; transition: border-color 0.2s;
        }
        .note.selected { border-color: var(--f-blue); z-index: 500 !important; cursor: grabbing; }

        /* [개선] 덜 이질적인 컨트롤 바 디자인 */
        .note-controls { 
            position: absolute; top: -65px; left: 50%; transform: translateX(-50%); 
            display: none; gap: 20px; background: rgba(40, 40, 40, 0.9); 
            padding: 10px 25px; border-radius: 20px; align-items: center; 
            backdrop-filter: blur(5px); box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .note.selected .note-controls { display: flex; }
        
        .control-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; color: #eee; transition: 0.2s; }
        .control-item:hover { color: white; transform: translateY(-2px); }
        .control-icon { font-size: 18px; margin-bottom: 2px; }
        .control-label { font-size: 10px; font-weight: 600; opacity: 0.9; }

        /* 이미지 조절기 */
        .img-container { position: relative; margin-bottom: 12px; display: inline-block; align-self: flex-start; }
        .img-active { outline: 2.5px solid var(--f-blue); outline-offset: 2px; border-radius: 4px; }
        .note img { display: block; border-radius: 8px; pointer-events: none; }
        .img-resizer { position: absolute; width: 12px; height: 12px; background: var(--f-blue); right: -6px; bottom: -6px; border-radius: 50%; cursor: nwse-resize; display: none; border: 2px solid white; }
        .img-active .img-resizer { display: block; }

        /* 텍스트 입력 */
        .note textarea { 
            width: 100%; flex-grow: 1; border: none; resize: none; outline: none; 
            background: transparent; font-family: inherit; font-size: 18px; 
            color: #333; pointer-events: none; margin-top: 5px;
        }
        .note.editing textarea { pointer-events: auto; user-select: text; }
        .author-tag { font-size: 10px; color: rgba(0,0,0,0.2); margin-top: 15px; font-weight: 800; letter-spacing: 0.5px; }
        
        /* 노트 리사이저 */
        .resizer { position: absolute; width: 15px; height: 15px; background: #eee; right: 10px; bottom: 10px; border-radius: 4px; cursor: nwse-resize; display: none; }
        .note.selected .resizer { display: block; }

        /* 원형 색상 피커 */
        .circular-input-wrapper { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; position: relative; border: 8px solid #f0f0f0; margin: 0 auto; cursor: pointer; }
        #real-color-picker { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div id="name-modal" class="overlay">
    <div class="modal-content">
        <h3 id="modal-title">닉네임 설정</h3>
        <input type="text" id="user-name-input" maxlength="8" style="padding:15px; border-radius:12px; border:2px solid #eee; width:80%; margin-bottom:20px; font-size:16px; text-align:center;">
        <button id="start-btn" class="tool-btn" style="background: var(--f-blue); color: white; width: 100%; border:none; padding:15px; border-radius:12px; cursor:pointer; font-weight:bold;">시작하기</button>
    </div>
</div>

<div id="color-modal" class="overlay">
    <div class="modal-content">
        <h3 style="margin-bottom:25px; color:#333;">색상 선택</h3>
        <div class="circular-input-wrapper"><input type="color" id="real-color-picker"></div>
        <div style="background:#f8f9fa; padding:15px; border-radius:15px; margin:25px 0; display:flex; gap:10px; justify-content:center; align-items:center; border:1px solid #eee;">
            <span style="font-weight:800; color:#999; font-size:13px;">HEX</span>
            <input type="text" id="hex-text-display" maxlength="7" style="border:none; background:transparent; font-family:monospace; font-size:18px; width:100px; text-align:center; outline:none; color:#333;">
        </div>
        <button id="color-confirm-btn" style="background: #222; color: white; width: 100%; padding:15px; border-radius:12px; border:none; cursor:pointer; font-weight:bold;">변경 사항 적용</button>
    </div>
</div>

<div id="toolbar">
    <div id="name-display-area">Guest</div>
    <button id="add-note">+ 새 메모</button>
</div>
<div id="canvas"></div>
<input type="file" id="hidden-file-input" accept="image/*" style="display:none">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, set, update, remove, onDisconnect, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCX4hr8AauLtShugeHdogIa9WlKG1GeLDA",
      authDomain: "japan-travel-b6597.firebaseapp.com",
      databaseURL: "https://japan-travel-b6597-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "japan-travel-b6597",
      storageBucket: "japan-travel-b6597.firebasestorage.app",
      messagingSenderId: "207320927993",
      appId: "1:207320927993:web:df014223249603767a1c28",
      measurementId: "G-QTGGD2L5RC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const notesRef = ref(db, 'notes');
    const myId = localStorage.getItem('padlet_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('padlet_id', myId);
    
    let myName = localStorage.getItem('padlet_name');
    const myColor = `hsl(${Math.random() * 360}, 80%, 50%)`;
    let selectedNoteId = null;
    let isShiftPressed = false;

    // 단축키 삭제 및 Shift 상태 관리
    window.addEventListener('keydown', (e) => { 
        if(e.key === 'Shift') isShiftPressed = true;
        if((e.key === 'Delete' || e.key === 'Backspace') && selectedNoteId) {
            if(document.activeElement.tagName !== 'TEXTAREA') {
                remove(ref(db, `notes/${selectedNoteId}`));
                selectedNoteId = null;
            }
        }
    });
    window.addEventListener('keyup', (e) => { if(e.key === 'Shift') isShiftPressed = false; });

    // 이름 및 커서 연동 로직
    const nameModal = document.getElementById('name-modal');
    const nameInput = document.getElementById('user-name-input');
    const nameDisplay = document.getElementById('name-display-area');

    nameDisplay.addEventListener('click', () => { nameModal.style.display = 'flex'; nameInput.value = myName; nameInput.focus(); });
    document.getElementById('start-btn').addEventListener('click', async () => {
        const val = nameInput.value.trim();
        if (val) {
            myName = val;
            localStorage.setItem('padlet_name', myName);
            nameDisplay.innerText = myName;
            nameModal.style.display = 'none';
            const snapshot = await get(notesRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (let id in data) if (data[id].authorId === myId) update(ref(db, `notes/${id}`), { author: myName });
            }
            initApp();
        }
    });

    if (!myName) nameModal.style.display = 'flex'; else { nameDisplay.innerText = myName; initApp(); }

    function initApp() {
        const myCursorRef = ref(db, `cursors/${myId}`);
        onDisconnect(myCursorRef).remove();
        document.addEventListener('mousemove', (e) => set(myCursorRef, { x: e.pageX, y: e.pageY, color: myColor, name: myName }));
        onValue(ref(db, 'cursors'), (s) => {
            const data = s.val() || {};
            document.querySelectorAll('.user-cursor').forEach(c => { if (!data[c.id.replace('cursor-', '')]) c.remove(); });
            for (let id in data) {
                if (id === myId) continue;
                let el = document.getElementById(`cursor-${id}`);
                if (!el) {
                    el = document.createElement('div'); el.id = `cursor-${id}`; el.className = 'user-cursor';
                    el.style.position = 'absolute'; el.style.pointerEvents = 'none'; el.style.zIndex = '9999';
                    el.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" style="fill:${data[id].color}; stroke:white; stroke-width:1.5px;"><path d="M7 2l12 11.2-5.8.8 3.3 6.3-2.1 1.1-3.3-6.2-4.1 3.8z"/></svg><div style="background:${data[id].color}; position:absolute; left:14px; top:14px; color:white; padding:3px 10px; border-radius:20px; font-size:11px; white-space:nowrap; font-weight:600;">${data[id].name}</div>`;
                    document.body.appendChild(el);
                }
                el.style.left = data[id].x + 'px'; el.style.top = data[id].y + 'px';
            }
        });
    }

    // 컬러피커 동기화
    const colorModal = document.getElementById('color-modal');
    const realPicker = document.getElementById('real-color-picker');
    const hexDisplay = document.getElementById('hex-text-display');
    realPicker.addEventListener('input', (e) => { hexDisplay.value = e.target.value.toUpperCase(); });
    document.getElementById('color-confirm-btn').addEventListener('click', () => {
        if(selectedNoteId) update(ref(db, `notes/${selectedNoteId}`), { color: realPicker.value });
        colorModal.style.display = 'none';
    });

    document.getElementById('add-note').addEventListener('click', () => {
        push(notesRef, { x: window.scrollX+100, y: window.scrollY+100, w: 260, h: 220, text: "", fontSize: 18, color: '#ffffff', author: myName, authorId: myId, img: "", imgW: 0, imgH: 0 });
    });

    function renderNote(id, data) {
        let note = document.querySelector(`.note[data-id="${id}"]`);
        if (!note) {
            note = document.createElement('div'); note.className = 'note'; note.dataset.id = id;
            note.innerHTML = `
                <div class="note-controls">
                    <div class="control-item palette-open"><span class="control-icon">🎨</span><span class="control-label">색상</span></div>
                    <div class="control-item add-img-btn"><span class="control-icon">🖼️</span><span class="control-label">사진추가</span></div>
                    <div class="control-item del-img-btn" style="display:none;"><span class="control-icon">✂️</span><span class="control-label">사진삭제</span></div>
                    <div class="control-item del-note-btn" style="color:var(--f-red);"><span class="control-icon">🗑️</span><span class="control-label">노트삭제</span></div>
                </div>
                <div class="img-area"></div>
                <textarea placeholder="생각을 입력하세요..."></textarea>
                <div class="author-tag">BY ${data.author}</div>
                <div class="resizer"></div>
            `;
            document.getElementById('canvas').appendChild(note);
            setupEvents(note, id);
        }
        if (note.dataset.isInteracting === "true") return;
        note.style.left = data.x + 'px'; note.style.top = data.y + 'px';
        note.style.width = data.w + 'px'; note.style.height = data.h + 'px';
        note.style.backgroundColor = data.color;
        note.querySelector('textarea').value = data.text;
        note.querySelector('textarea').style.fontSize = data.fontSize + 'px';
        note.querySelector('.author-tag').innerText = `BY ${data.author}`;

        const imgArea = note.querySelector('.img-area');
        if (data.img) {
            imgArea.innerHTML = `<div class="img-container" style="width:${data.imgW}px; height:${data.imgH}px;"><img src="${data.img}" style="width:100%; height:100%;"><div class="img-resizer"></div></div>`;
        } else imgArea.innerHTML = '';
    }

    // [핵심] 드래그 및 리사이즈 로직 완전 수정
    function setupEvents(note, id) {
        const ta = note.querySelector('textarea'), rs = note.querySelector('.resizer');
        let move = false, resize = false, imgResize = false, start = {}, ratio = 1;

        note.addEventListener('mousedown', (e) => {
            // 텍스트 선택 방지
            if (e.detail > 1) e.preventDefault(); 
            
            document.querySelectorAll('.note').forEach(n => n.classList.remove('selected'));
            document.querySelectorAll('.img-container').forEach(c => c.classList.remove('img-active'));
            
            selectedNoteId = id;
            note.classList.add('selected');
            note.dataset.isInteracting = "true";

            const imgCon = note.querySelector('.img-container');
            const imgRs = note.querySelector('.img-resizer');
            const delImgBtn = note.querySelector('.del-img-btn');

            if (e.target === imgRs) {
                imgResize = true; ratio = imgCon.offsetWidth / imgCon.offsetHeight;
                e.stopPropagation(); e.preventDefault();
            } else if (imgCon && imgCon.contains(e.target)) {
                imgCon.classList.add('img-active');
                if(delImgBtn) delImgBtn.style.display = 'flex';
                move = true; // 사진 잡고도 이동 가능하게
            } else if (e.target === rs) {
                resize = true;
                e.stopPropagation(); e.preventDefault();
            } else if (e.target.closest('.control-item')) {
                e.stopPropagation();
            } else if (!note.classList.contains('editing')) {
                move = true;
            }
            start = { x: e.clientX, y: e.clientY, l: note.offsetLeft, t: note.offsetTop, w: note.offsetWidth, h: note.offsetHeight, iw: imgCon?imgCon.offsetWidth:0, ih: imgCon?imgCon.offsetHeight:0 };
        });

        document.addEventListener('mousemove', (e) => {
            if (move) {
                update(ref(db, `notes/${id}`), { x: start.l + (e.clientX - start.x), y: start.t + (e.clientY - start.y) });
            } else if (resize) {
                update(ref(db, `notes/${id}`), { w: Math.max(200, start.w + (e.clientX - start.x)), h: Math.max(150, start.h + (e.clientY - start.y)) });
            } else if (imgResize) {
                const limit = Math.min(note.offsetWidth, note.offsetHeight) * 0.95;
                let nw = Math.min(limit, start.iw + (e.clientX - start.x));
                update(ref(db, `notes/${id}`), { imgW: nw, imgH: isShiftPressed ? nw / ratio : Math.min(limit, start.ih + (e.clientY - start.y)) });
            }
        });

        document.addEventListener('mouseup', () => { move = resize = imgResize = false; note.dataset.isInteracting = "false"; });

        note.addEventListener('click', (e) => {
            const btn = e.target.closest('.control-item');
            if (!btn) return;
            if (btn.classList.contains('palette-open')) {
                realPicker.value = dataToHex(note.style.backgroundColor);
                hexDisplay.value = realPicker.value.toUpperCase();
                colorModal.style.display = 'flex';
            } else if (btn.classList.contains('add-img-btn')) {
                window.currentImgId = id; document.getElementById('hidden-file-input').click();
            } else if (btn.classList.contains('del-img-btn')) {
                update(ref(db, `notes/${id}`), { img: "", imgW: 0, imgH: 0 }); btn.style.display = 'none';
            } else if (btn.classList.contains('del-note-btn')) remove(ref(db, `notes/${id}`));
        });

        note.addEventListener('dblclick', () => { note.classList.add('editing'); ta.focus(); });
        ta.addEventListener('blur', () => { note.classList.remove('editing'); update(ref(db, `notes/${id}`), { text: ta.value }); });
    }

    document.getElementById('hidden-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && window.currentImgId) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    update(ref(db, `notes/${window.currentImgId}`), { img: ev.target.result, imgW: 180, imgH: (180/img.width)*img.height });
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    function dataToHex(rgb) {
        if(!rgb || rgb.startsWith('#')) return rgb || '#ffffff';
        const parts = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
        delete(parts[0]);
        for (let i = 1; i <= 3; ++i) { parts[i] = parseInt(parts[i]).toString(16); if (parts[i].length == 1) parts[i] = '0' + parts[i]; }
        return '#' + parts.join('');
    }

    onChildAdded(notesRef, (s) => renderNote(s.key, s.val()));
    onChildChanged(notesRef, (s) => renderNote(s.key, s.val()));
    onChildRemoved(notesRef, (s) => document.querySelector(`.note[data-id="${s.key}"]`)?.remove());
</script>
</body>
</html>
