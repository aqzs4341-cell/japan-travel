<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Fixed Padlet</title>
    <style>
        :root { --f-blue: #18a0fb; --f-red: #ff4d4f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f3f4f6; overflow: hidden; font-family: sans-serif; }
        
        /* 무한 캔버스 설정 */
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; }
        #canvas { position: absolute; top: 0; left: 0; }
        #grid { position: absolute; width: 400000px; height: 400000px; left: -200000px; top: -200000px; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }

        /* [핵심] 버튼 가로 배치 스타일 */
        .note-controls { 
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%); 
            display: none; background: #1e1e1e; padding: 10px 20px; border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            /* 가로 정렬 강제 설정 */
            flex-direction: row !important; 
            display: none; /* 기본 숨김 */
            gap: 20px;
            white-space: nowrap !important;
            align-items: center;
        }
        .note.selected .note-controls { display: flex !important; } /* 선택 시만 가로로 표시 */

        .control-item { color: #ddd; cursor: pointer; font-size: 12px; font-weight: bold; border: none; background: none; }
        .control-item:hover { color: white; }

        /* 포스트잇 스타일 */
        .note { position: absolute; padding: 15px; border-radius: 15px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); min-width: 250px; min-height: 180px; border: 2px solid transparent; }
        .note.selected { border-color: var(--f-blue); z-index: 1000 !important; }
        
        .note textarea { width: 100%; flex-grow: 1; border: none; resize: none; outline: none; background: transparent; font-size: 16px; margin-top: 5px; }
        .author-tag { font-size: 10px; color: #999; margin-top: 5px; }
        .resizer { position: absolute; width: 15px; height: 15px; right: 0; bottom: 0; cursor: nwse-resize; }

        /* 상단 바 */
        #toolbar { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; gap: 10px; background: white; padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tool-btn { background: #111; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="name-display" style="font-weight:bold; cursor:pointer;">이름 설정</div>
    <button id="add-note" class="tool-btn">+ 새 메모</button>
</div>

<div id="viewport">
    <div id="canvas"><div id="grid"></div></div>
</div>

<input type="file" id="file-input" style="display:none">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCX4hr8AauLtShugeHdogIa9WlKG1GeLDA",
      authDomain: "japan-travel-b6597.firebaseapp.com",
      databaseURL: "https://japan-travel-b6597-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "japan-travel-b6597",
      storageBucket: "japan-travel-b6597.firebasestorage.app",
      messagingSenderId: "207320927993",
      appId: "1:207320927993:web:df014223249603767a1c28",
      measurementId: "G-QTGGD2L5RC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const notesRef = ref(db, 'notes');

    const canvas = document.getElementById('canvas');
    const viewport = document.getElementById('viewport');
    let offX = 0, offY = 0, isPanning = false;
    let selId = null;

    // 1. 캔버스 이동 (Pan)
    viewport.onmousedown = (e) => { if(e.target === viewport || e.target.id === 'grid') isPanning = true; };
    window.onmousemove = (e) => {
        if(isPanning) { offX += e.movementX; offY += e.movementY; canvas.style.transform = `translate(${offX}px, ${offY}px)`; }
    };
    window.onmouseup = () => isPanning = false;

    // 2. 노트 렌더링 (삭제 기능 및 레이아웃 수정)
    function renderNote(id, data) {
        let note = document.querySelector(`.note[data-id="${id}"]`);
        if (!note) {
            note = document.createElement('div');
            note.className = 'note';
            note.dataset.id = id;
            note.innerHTML = `
                <div class="note-controls">
                    <button class="btn-color control-item">🎨 색상</button>
                    <button class="btn-img control-item">🖼️ 사진</button>
                    <button class="btn-del control-item" style="color: #ff4d4f;">🗑️ 삭제</button>
                </div>
                <div class="img-box"></div>
                <textarea></textarea>
                <div class="author-tag">BY ${data.author || '익명'}</div>
                <div class="resizer"></div>
            `;
            canvas.appendChild(note);

            // --- 버튼 이벤트 (가장 중요한 부분) ---
            const stop = (e) => e.stopPropagation();
            
            // 삭제 버튼: 즉시 실행
            const delBtn = note.querySelector('.btn-del');
            delBtn.onmousedown = stop;
            delBtn.onclick = (e) => {
                e.stopPropagation();
                remove(ref(db, `notes/${id}`)); // Firebase에서 즉시 삭제
            };

            // 색상 버튼
            const colorBtn = note.querySelector('.btn-color');
            colorBtn.onmousedown = stop;
            colorBtn.onclick = (e) => {
                e.stopPropagation();
                const newColor = prompt("색상 코드를 입력하세요 (예: #ff0000 또는 yellow)", data.color || "#ffffff");
                if(newColor) update(ref(db, `notes/${id}`), { color: newColor });
            };

            // 사진 버튼
            const imgBtn = note.querySelector('.btn-img');
            imgBtn.onmousedown = stop;
            imgBtn.onclick = (e) => {
                e.stopPropagation();
                window.targetNoteId = id;
                document.getElementById('file-input').click();
            };

            note.onmousedown = (e) => {
                selId = id;
                document.querySelectorAll('.note').forEach(n => n.classList.remove('selected'));
                note.classList.add('selected');
                
                // 드래그 로직
                if(e.target.classList.contains('resizer')) return; // 리사이즈 시 드래그 방지
                let sX = e.clientX, sY = e.clientY;
                let sL = note.offsetLeft, sT = note.offsetTop;
                
                const move = (me) => {
                    const nx = sL + (me.clientX - sX);
                    const ny = sT + (me.clientY - sY);
                    note.style.left = nx + 'px';
                    note.style.top = ny + 'px';
                    update(ref(db, `notes/${id}`), { x: nx, y: ny });
                };
                const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
            };

            note.querySelector('textarea').oninput = (e) => {
                update(ref(db, `notes/${id}`), { text: e.target.value });
            };
        }

        // 실시간 업데이트 반영
        note.style.left = data.x + 'px';
        note.style.top = data.y + 'px';
        note.style.backgroundColor = data.color || '#ffffff';
        note.querySelector('textarea').value = data.text || "";
        if(data.img) note.querySelector('.img-box').innerHTML = `<img src="${data.img}" style="width:100%; border-radius:10px;">`;
    }

    // 사진 처리
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => update(ref(db, `notes/${window.targetNoteId}`), { img: ev.target.result });
        reader.readAsDataURL(file);
    };

    // 추가 버튼
    document.getElementById('add-note').onclick = () => {
        const nx = -offX + 100, ny = -offY + 100;
        push(notesRef, { x: nx, y: ny, text: "", author: "Guest", color: "#ffffff" });
    };

    onChildAdded(notesRef, s => renderNote(s.key, s.val()));
    onChildChanged(notesRef, s => renderNote(s.key, s.val()));
    onChildRemoved(notesRef, s => document.querySelector(`.note[data-id="${s.key}"]`)?.remove());
</script>
</body>
</html>
