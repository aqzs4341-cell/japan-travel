<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초미니 피그마-패들렛</title>
    <style>
        :root { --f-blue: #18a0fb; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: auto; background-color: #f0f0f0; font-family: sans-serif; }
        
        /* 무한 대지 배경 */
        #canvas {
            width: 5000px; height: 5000px;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 30px 30px;
            position: relative;
            cursor: crosshair;
        }

        #toolbar { position: fixed; top: 20px; left: 20px; z-index: 10000; }
        button { padding: 12px 24px; background: var(--f-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* 메모지 스타일 */
        .note {
            position: absolute;
            width: 200px; height: 150px;
            padding: 10px; border-radius: 4px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
            cursor: move; border: 1px solid rgba(0,0,0,0.05);
            transition: box-shadow 0.2s;
        }
        .note.editing { cursor: default; box-shadow: 0 0 0 2px var(--f-blue); }
        
        /* 텍스트 영역 */
        .note textarea {
            width: 100%; height: 100%;
            border: none; resize: both; outline: none;
            background: transparent; font-size: 16px;
            overflow: hidden; cursor: inherit;
        }

        /* 유저 커서 */
        .user-cursor {
            position: absolute; width: 15px; height: 15px;
            border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
            pointer-events: none; z-index: 9999; transition: all 0.1s linear;
        }
        .cursor-label {
            position: absolute; left: 15px; bottom: 15px; color: white;
            padding: 2px 8px; border-radius: 4px; font-size: 10px;
            transform: rotate(45deg); white-space: nowrap; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="toolbar"><button id="add-note">+ 메모 추가</button></div>
    <div id="canvas"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildChanged, update, set, onValue, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // [필독] 여기 본인 Firebase 정보로 꼭 채우세요!
        const firebaseConfig = {
            apiKey: "본인꺼",
            authDomain: "본인꺼",
            databaseURL: "https://japan-travel-b6597-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "japan-travel-b6597",
            storageBucket: "본인꺼",
            messagingSenderId: "본인꺼",
            appId: "본인꺼"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const notesRef = ref(db, 'notes');
        const canvas = document.getElementById('canvas');

        // 내 정보 설정
        const myId = Math.random().toString(36).substring(7);
        const myColor = `hsl(${Math.random() * 360}, 70%, 50%)`;

        // 1. 실시간 커서 로직
        canvas.addEventListener('mousemove', (e) => {
            set(ref(db, `cursors/${myId}`), { x: e.pageX, y: e.pageY, color: myColor });
        });

        onValue(ref(db, 'cursors'), (snapshot) => {
            const cursors = snapshot.val();
            for (let id in cursors) {
                if (id === myId) continue;
                let el = document.getElementById(`cursor-${id}`);
                if (!el) {
                    el = document.createElement('div');
                    el.id = `cursor-${id}`; el.className = 'user-cursor';
                    el.innerHTML = `<div class="cursor-label">${id}</div>`;
                    document.body.appendChild(el);
                }
                el.style.backgroundColor = cursors[id].color;
                el.style.left = cursors[id].x + 'px'; el.style.top = cursors[id].y + 'px';
            }
        });

        // 2. 메모 생성/수정 로직
        const colors = ['#fff9c4', '#ffccbc', '#c8e6c9', '#bbdefb', '#f8bbd0'];
        
        document.getElementById('add-note').addEventListener('click', () => {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            push(notesRef, {
                x: window.scrollX + 100, y: window.scrollY + 100,
                w: 200, h: 150, fontSize: 16,
                text: "새 메모 (더블클릭)", color: randomColor
            });
        });

        function createOrUpdateNote(data, id) {
            let note = document.querySelector(`.note[data-id="${id}"]`);
            if (!note) {
                note = document.createElement('div');
                note.className = 'note'; note.dataset.id = id;
                note.innerHTML = `<textarea readonly></textarea>`;
                canvas.appendChild(note);
                setupNoteEvents(note, id);
            }
            
            // 데이터 동기화 (편집 중이 아닐 때만)
            if (!note.classList.contains('editing')) {
                note.style.left = data.x + 'px';
                note.style.top = data.y + 'px';
                note.style.width = data.w + 'px';
                note.style.height = data.h + 'px';
                note.style.backgroundColor = data.color;
                const txt = note.querySelector('textarea');
                txt.value = data.text;
                txt.style.fontSize = (data.fontSize || 16) + 'px';
            }
        }

        function setupNoteEvents(note, id) {
            const textarea = note.querySelector('textarea');
            let isMoving = false; let offset = {x:0, y:0};

            note.addEventListener('dblclick', () => {
                note.classList.add('editing'); textarea.readOnly = false; textarea.focus();
            });

            textarea.addEventListener('blur', () => {
                note.classList.remove('editing'); textarea.readOnly = true;
                update(ref(db, `notes/${id}`), { 
                    text: textarea.value, 
                    w: note.offsetWidth - 20, h: note.offsetHeight - 20,
                    fontSize: parseInt(textarea.style.fontSize) || 16 
                });
            });

            // 휠로 글씨 크기 조절 (피그마 느낌)
            textarea.addEventListener('wheel', (e) => {
                if (!note.classList.contains('editing')) return;
                e.preventDefault();
                let currentSize = parseInt(window.getComputedStyle(textarea).fontSize);
                textarea.style.fontSize = (e.deltaY < 0 ? currentSize + 1 : currentSize - 1) + 'px';
            });

            note.addEventListener('mousedown', (e) => {
                if (!textarea.readOnly) return;
                isMoving = true;
                offset = { x: e.clientX - note.offsetLeft, y: e.clientY - note.offsetTop };
                note.style.zIndex = 1000;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isMoving) return;
                note.style.left = (e.clientX - offset.x) + 'px';
                note.style.top = (e.clientY - offset.y) + 'px';
            });

            document.addEventListener('mouseup', () => {
                if (isMoving) {
                    update(ref(db, `notes/${id}`), { x: parseInt(note.style.left), y: parseInt(note.style.top) });
                    isMoving = false; note.style.zIndex = 1;
                }
            });
        }

        // Firebase 리스너
        onChildAdded(notesRef, (s) => createOrUpdateNote(s.val(), s.key));
        onChildChanged(notesRef, (s) => createOrUpdateNote(s.val(), s.key));
        
        // 나갈 때 내 커서 지우기
        window.onbeforeunload = () => set(ref(db, `cursors/${myId}`), null);
    </script>
</body>
</html>
