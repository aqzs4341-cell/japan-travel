<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Real-time Sticky Board</title>
    <style>
        :root { --f-blue: #18a0fb; --f-red: #ff4d4f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f0f2f5; font-family: 'Pretendard', sans-serif; overflow: auto; }
        #canvas { width: 5000px; height: 5000px; position: relative; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 30px 30px; user-select: none; }

        /* 포스트잇 */
        .note { 
            position: absolute; display: flex; flex-direction: column; 
            padding: 18px; border-radius: 16px; background: white; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 2.5px solid transparent;
            min-width: 220px; min-height: 160px; box-sizing: border-box; z-index: 10;
            cursor: grab; touch-action: none;
        }
        .note.selected { border-color: var(--f-blue); z-index: 1000 !important; cursor: grabbing; }

        /* [개선] 가로로 길고 깔끔한 블랙 컨트롤바 */
        .note-controls { 
            position: absolute; top: -65px; left: 50%; transform: translateX(-50%); 
            display: none; gap: 20px; background: #1e1e1e; 
            padding: 10px 25px; border-radius: 12px; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000;
        }
        .note.selected .note-controls { display: flex; }
        .control-item { color: #eee; cursor: pointer; font-size: 11px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .control-item:hover { color: white; }

        /* 텍스트 & 리사이저 */
        .note textarea { width: 100%; flex-grow: 1; border: none; resize: none; outline: none; background: transparent; font-size: 18px; margin-top: 10px; pointer-events: none; }
        .note.editing textarea { pointer-events: auto; }
        .resizer { position: absolute; width: 20px; height: 20px; right: 0; bottom: 0; cursor: nwse-resize; z-index: 5; }

        /* 상단 바 */
        #toolbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; gap: 20px; align-items: center; border: 1px solid #eee; }
        #add-note { background: #111; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="name-tag" style="font-weight: 900; color: #333;">MY BOARD</div>
    <button id="add-note">+ 새 메모 추가</button>
</div>

<div id="canvas"></div>
<input type="file" id="file-input" style="display:none">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCX4hr8AauLtShugeHdogIa9WlKG1GeLDA",
      authDomain: "japan-travel-b6597.firebaseapp.com",
      databaseURL: "https://japan-travel-b6597-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "japan-travel-b6597",
      storageBucket: "japan-travel-b6597.firebasestorage.app",
      messagingSenderId: "207320927993",
      appId: "1:207320927993:web:df014223249603767a1c28",
      measurementId: "G-QTGGD2L5RC"
    };


    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const notesRef = ref(db, 'notes');

    let activeId = null;
    let isMoving = false;
    let isResizing = false;
    let startX, startY, startW, startH, startL, startT;

    // --- 실시간 드래그 로직 (이게 핵심) ---
    window.addEventListener('mousedown', (e) => {
        const note = e.target.closest('.note');
        const resizer = e.target.classList.contains('resizer');
        const control = e.target.closest('.note-controls');

        if (!note || control) {
            if (!control) {
                document.querySelectorAll('.note').forEach(n => n.classList.remove('selected'));
                activeId = null;
            }
            return;
        }

        activeId = note.dataset.id;
        document.querySelectorAll('.note').forEach(n => n.classList.remove('selected'));
        note.classList.add('selected');

        startX = e.clientX; startY = e.clientY;
        startL = note.offsetLeft; startT = note.offsetTop;
        startW = note.offsetWidth; startH = note.offsetHeight;

        if (resizer) {
            isResizing = true;
        } else if (!note.classList.contains('editing')) {
            isMoving = true;
        }

        if (isMoving || isResizing) {
            note.setAttribute('data-dragging', 'true'); // 드래그 시작 표시
            e.preventDefault();
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!activeId || (!isMoving && !isResizing)) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        const note = document.querySelector(`.note[data-id="${activeId}"]`);

        if (isMoving) {
            const newX = startL + dx;
            const newY = startT + dy;
            note.style.left = newX + 'px';
            note.style.top = newY + 'px';
            // DB 업데이트는 mousemove에서 하되, 화면 갱신 로직에서 이 노트는 제외됨
            update(ref(db, `notes/${activeId}`), { x: newX, y: newY });
        } else if (isResizing) {
            const newW = Math.max(200, startW + dx);
            const newH = Math.max(150, startH + dy);
            note.style.width = newW + 'px';
            note.style.height = newH + 'px';
            update(ref(db, `notes/${activeId}`), { w: newW, h: newH });
        }
    });

    window.addEventListener('mouseup', () => {
        if (activeId) {
            const note = document.querySelector(`.note[data-id="${activeId}"]`);
            if (note) note.removeAttribute('data-dragging');
        }
        isMoving = false;
        isResizing = false;
    });

    // --- 렌더링 (DB 변경 감지) ---
    function renderNote(id, data) {
        let note = document.querySelector(`.note[data-id="${id}"]`);
        
        if (!note) {
            note = document.createElement('div');
            note.className = 'note';
            note.dataset.id = id;
            note.innerHTML = `
                <div class="note-controls">
                    <div class="control-item del-btn"><span>🗑️</span>삭제</div>
                    <div class="control-item img-btn"><span>🖼️</span>사진</div>
                </div>
                <div class="img-area"></div>
                <textarea placeholder="글을 남겨주세요..."></textarea>
                <div class="resizer"></div>
            `;
            document.getElementById('canvas').appendChild(note);

            note.querySelector('.del-btn').onclick = () => remove(ref(db, `notes/${id}`));
            note.querySelector('.img-btn').onclick = () => { window.targetNote = id; document.getElementById('file-input').click(); };
            
            note.ondblclick = () => { note.classList.add('editing'); note.querySelector('textarea').focus(); };
            note.querySelector('textarea').onblur = () => {
                note.classList.remove('editing');
                update(ref(db, `notes/${id}`), { text: note.querySelector('textarea').value });
            };
        }

        // [중요] 내가 현재 드래그 중인 노트는 DB 값으로 덮어쓰지 않음! (끊김 방지)
        if (note.getAttribute('data-dragging') === 'true') return;

        note.style.left = data.x + 'px';
        note.style.top = data.y + 'px';
        note.style.width = data.w + 'px';
        note.style.height = data.h + 'px';
        note.querySelector('textarea').value = data.text || "";
        if (data.img) {
            note.querySelector('.img-area').innerHTML = `<img src="${data.img}" style="width:100%; border-radius:8px;">`;
        }
    }

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => update(ref(db, `notes/${window.targetNote}`), { img: ev.target.result });
        reader.readAsDataURL(file);
    };

    document.getElementById('add-note').onclick = () => {
        push(notesRef, { x: 150, y: 150, w: 250, h: 200, text: "", author: "익명" });
    };

    onChildAdded(notesRef, s => renderNote(s.key, s.val()));
    onChildChanged(notesRef, s => renderNote(s.key, s.val()));
    onChildRemoved(notesRef, s => document.querySelector(`.note[data-id="${s.key}"]`)?.remove());
</script>
</body>
</html>
