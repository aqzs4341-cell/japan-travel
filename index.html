<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Infinite Canvas Board</title>
    <style>
        :root { --f-blue: #18a0fb; --bg-gray: #f3f4f6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-gray); overflow: hidden; font-family: 'Pretendard', sans-serif; }
        
        /* [핵심] 무한 배경을 시뮬레이션하는 래퍼 */
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; }
        #viewport:active { cursor: grabbing; }

        /* 실제 요소들이 배치되는 가상 캔버스 */
        #canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        
        /* 좌표 표시기 */
        #coord-display { 
            position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); 
            color: white; padding: 8px 15px; border-radius: 10px; font-size: 12px; 
            font-family: monospace; z-index: 10000; pointer-events: none;
        }

        /* 툴바 */
        #toolbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; gap: 15px; background: rgba(255, 255, 255, 0.9); padding: 10px 25px; border-radius: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); backdrop-filter: blur(10px); align-items: center; border: 1px solid #eee; }
        #add-note { background: #111; color: white; border: none; padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: 700; }

        /* 포스트잇 스타일 */
        .note { position: absolute; padding: 20px; border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.06); border: 2.5px solid transparent; min-width: 240px; min-height: 180px; box-sizing: border-box; cursor: pointer; }
        .note.selected { border-color: var(--f-blue); z-index: 1000 !important; }
        .note-controls { position: absolute; top: -70px; left: 50%; transform: translateX(-50%); display: none; gap: 20px; background: #1e1e1e; padding: 12px 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .note.selected .note-controls { display: flex; }
        .control-item { color: #ccc; cursor: pointer; font-size: 11px; text-align: center; }
        .note textarea { width: 100%; flex-grow: 1; border: none; resize: none; outline: none; background: transparent; font-size: 18px; pointer-events: none; }
        .note.editing textarea { pointer-events: auto; }
        .resizer { position: absolute; width: 15px; height: 15px; right: 5px; bottom: 5px; cursor: nwse-resize; }
    </style>
</head>
<body>

<div id="coord-display">X: 0, Y: 0</div>

<div id="toolbar">
    <div id="name-area" style="font-weight:800; cursor:pointer;">Guest</div>
    <button id="add-note">+ 새 메모</button>
    <button id="reset-view" style="background:#eee; border:none; padding:10px 15px; border-radius:20px; cursor:pointer; font-size:12px;">🏠 센터</button>
</div>

<div id="viewport">
    <div id="canvas">
        <div id="grid" style="position:absolute; width:100000px; height:100000px; left:-50000px; top:-50000px; background-image: radial-gradient(#d1d1d1 1.2px, transparent 1.2px); background-size: 40px 40px; z-index:-1;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCX4hr8AauLtShugeHdogIa9WlKG1GeLDA",
      authDomain: "japan-travel-b6597.firebaseapp.com",
      databaseURL: "https://japan-travel-b6597-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "japan-travel-b6597",
      storageBucket: "japan-travel-b6597.firebasestorage.app",
      messagingSenderId: "207320927993",
      appId: "1:207320927993:web:df014223249603767a1c28",
      measurementId: "G-QTGGD2L5RC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const notesRef = ref(db, 'notes');

    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');
    const coordDisplay = document.getElementById('coord-display');

    // --- 무한 캔버스 상태 ---
    let offsetX = 0, offsetY = 0; // 화면 이동 값
    let isPanning = false;
    let selectedId = null;
    let isDraggingNote = false;

    // 캔버스 이동(Panning) 로직
    viewport.addEventListener('mousedown', (e) => {
        if (e.target === viewport || e.target.id === 'grid') {
            isPanning = true;
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (isPanning) {
            offsetX += e.movementX;
            offsetY += e.movementY;
            applyTransform();
        }
        // 좌표 표시 업데이트 (현재 마우스가 가리키는 캔버스 상의 실제 좌표)
        const canvasX = Math.round(e.clientX - offsetX);
        const canvasY = Math.round(e.clientY - offsetY);
        coordDisplay.innerText = `X: ${canvasX}, Y: ${canvasY}`;
    });

    window.addEventListener('mouseup', () => { isPanning = false; });

    function applyTransform() {
        canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
    }

    document.getElementById('reset-view').onclick = () => { offsetX = 0; offsetY = 0; applyTransform(); };

    // --- 노트 드래그/리사이즈 (기존 로직 유지하되 좌표 보정) ---
    let startX, startY, startL, startT;
    
    window.addEventListener('mousedown', (e) => {
        const note = e.target.closest('.note');
        if (!note || e.target.closest('.note-controls')) return;

        selectedId = note.dataset.id;
        document.querySelectorAll('.note').forEach(n => n.classList.remove('selected'));
        note.classList.add('selected');

        if (!note.classList.contains('editing')) {
            isDraggingNote = true;
            startX = e.clientX; startY = e.clientY;
            startL = parseInt(note.style.left); startT = parseInt(note.style.top);
            note.setAttribute('data-dragging', 'true');
            e.preventDefault();
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (isDraggingNote && selectedId) {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            const nx = startL + dx;
            const ny = startT + dy;
            
            const note = document.querySelector(`.note[data-id="${selectedId}"]`);
            note.style.left = nx + 'px';
            note.style.top = ny + 'px';
            update(ref(db, `notes/${selectedId}`), { x: nx, y: ny });
        }
    });

    window.addEventListener('mouseup', () => {
        if (selectedId) document.querySelector(`.note[data-id="${selectedId}"]`)?.removeAttribute('data-dragging');
        isDraggingNote = false;
    });

    // --- 렌더링 ---
    function renderNote(id, data) {
        let note = document.querySelector(`.note[data-id="${id}"]`);
        if (!note) {
            note = document.createElement('div');
            note.className = 'note';
            note.dataset.id = id;
            note.innerHTML = `
                <div class="note-controls"><div class="control-item del-btn">🗑️ 삭제</div></div>
                <textarea></textarea>
                <div style="font-size:9px; color:#ccc; margin-top:5px;">${id.substring(0,5)}</div>
            `;
            canvas.appendChild(note);
            note.querySelector('.del-btn').onclick = () => update(ref(db, `notes/${id}`), null);
            note.ondblclick = () => { note.classList.add('editing'); note.querySelector('textarea').focus(); };
            note.querySelector('textarea').onblur = () => {
                note.classList.remove('editing');
                update(ref(db, `notes/${id}`), { text: note.querySelector('textarea').value });
            };
        }
        if (note.getAttribute('data-dragging') === 'true') return;
        note.style.left = data.x + 'px';
        note.style.top = data.y + 'px';
        note.querySelector('textarea').value = data.text || "";
    }

    document.getElementById('add-note').onclick = () => {
        // 현재 화면 중앙 근처의 캔버스 좌표에 생성
        const spawnX = -offsetX + (window.innerWidth / 2) - 100;
        const spawnY = -offsetY + (window.innerHeight / 2) - 100;
        push(notesRef, { x: spawnX, y: spawnY, text: "", author: "익명" });
    };

    onChildAdded(notesRef, s => renderNote(s.key, s.val()));
    onChildChanged(notesRef, s => renderNote(s.key, s.val()));
    onChildRemoved(notesRef, s => document.querySelector(`.note[data-id="${s.key}"]`)?.remove());
</script>
</body>
</html>
