<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Fixed Padlet - Horizontal Buttons</title>
    <style>
        :root { --f-blue: #18a0fb; --f-red: #ff4d4f; }
        /* 커서 기본 화살표 고정 */
        * { cursor: default !important; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f3f4f6; overflow: hidden; font-family: sans-serif; }
        
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #canvas { position: absolute; top: 0; left: 0; }
        #grid { position: absolute; width: 400000px; height: 400000px; left: -200000px; top: -200000px; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }

        /* 상단 바 */
        #toolbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; gap: 15px; background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); align-items: center; }
        #name-display { font-weight: bold; border-right: 1px solid #eee; padding-right: 15px; }

        /* 포스트잇 */
        .note { position: absolute; padding: 20px; border-radius: 15px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); min-width: 280px; min-height: 200px; border: 2.5px solid transparent; display: flex; flex-direction: column; box-sizing: border-box; }
        .note.selected { border-color: var(--f-blue); z-index: 1000; }
        
        /* [수정] 컨트롤바: 가로 한 줄로 길게 정렬 */
        .note-controls { 
            position: absolute; top: -65px; left: 50%; transform: translateX(-50%); 
            display: none; background: #1e1e1e; padding: 12px 25px; border-radius: 12px; 
            gap: 20px; white-space: nowrap; flex-direction: row !important; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: auto !important;
        }
        .note.selected .note-controls { display: flex !important; }
        .c-item { color: #eee; font-size: 13px; font-weight: bold; background: none; border: none; padding: 5px 10px; display: inline-block; }
        .c-item:hover { color: white; }

        .note textarea { width: 100%; flex-grow: 1; border: none; resize: none; outline: none; background: transparent; font-size: 18px; margin-top: 10px; line-height: 1.5; }
        .resizer { position: absolute; width: 20px; height: 20px; right: 0; bottom: 0; z-index: 10; }

        /* 모달 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal { background: white; padding: 35px; border-radius: 20px; text-align: center; min-width: 300px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="toolbar">
    <div id="name-display">이름 설정</div>
    <button id="add-note" style="background:#111; color:white; border:none; padding:10px 20px; border-radius:25px; font-weight:bold;">+ 메모 추가</button>
</div>

<div id="viewport">
    <div id="canvas"><div id="grid"></div></div>
</div>

<div id="name-modal" class="overlay">
    <div class="modal">
        <h3 style="margin-top:0;">사용할 닉네임을 입력하세요</h3>
        <input type="text" id="name-input" style="padding:12px; width:80%; margin:20px 0; border-radius:10px; border:1.5px solid #ddd; font-size:16px; text-align:center; outline:none;">
        <br>
        <button id="name-save-btn" style="padding:12px 40px; background:var(--f-blue); color:white; border:none; border-radius:10px; font-weight:bold; width:100%;">저장하고 시작하기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCX4hr8AauLtShugeHdogIa9WlKG1GeLDA",
      authDomain: "japan-travel-b6597.firebaseapp.com",
      databaseURL: "https://japan-travel-b6597-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "japan-travel-b6597",
      storageBucket: "japan-travel-b6597.firebasestorage.app",
      messagingSenderId: "207320927993",
      appId: "1:207320927993:web:df014223249603767a1c28",
      measurementId: "G-QTGGD2L5RC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const notesRef = ref(db, 'notes');

    const canvas = document.getElementById('canvas');
    const viewport = document.getElementById('viewport');
    let offX = 0, offY = 0, isPanning = false;
    
    // [핵심] 브라우저별 개별 이름 (localStorage)
    let myName = localStorage.getItem('user_p_name') || "";

    const nameModal = document.getElementById('name-modal');
    const nameDisplay = document.getElementById('name-display');

    const showModal = () => { nameModal.style.display = 'flex'; };
    if (!myName) showModal();
    else nameDisplay.innerText = myName;

    document.getElementById('name-save-btn').onclick = () => {
        const val = document.getElementById('name-input').value.trim();
        if (val) {
            myName = val;
            localStorage.setItem('user_p_name', myName);
            nameDisplay.innerText = myName;
            nameModal.style.display = 'none';
        }
    };
    nameDisplay.onclick = showModal;

    // 캔버스 팬
    viewport.onmousedown = (e) => { if(e.target === viewport || e.target.id === 'grid') isPanning = true; };
    window.onmousemove = (e) => { if(isPanning) { offX += e.movementX; offY += e.movementY; canvas.style.transform = `translate(${offX}px, ${offY}px)`; } };
    window.onmouseup = () => isPanning = false;

    function renderNote(id, data) {
        let note = document.querySelector(`.note[data-id="${id}"]`);
        if (!note) {
            note = document.createElement('div');
            note.className = 'note';
            note.dataset.id = id;
            note.innerHTML = `
                <div class="note-controls">
                    <button class="c-item col-btn">🎨 색상</button>
                    <button class="c-item del-btn" style="color:var(--f-red)">🗑️ 삭제</button>
                </div>
                <textarea></textarea>
                <div class="author-tag" style="font-size:10px; color:#999; margin-top:5px;">BY ${data.author || '익명'}</div>
                <div class="resizer"></div>
            `;
            canvas.appendChild(note);

            const controls = note.querySelector('.note-controls');
            controls.onmousedown = (e) => e.stopPropagation(); 

            // 삭제 기능 확실히 작동
            note.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); remove(ref(db, `notes/${id}`)); };
            note.querySelector('.col-btn').onclick = (e) => {
                e.stopPropagation();
                const c = prompt("색상 코드 입력 (#ffffff 등)", data.color || "#ffffff");
                if(c) update(ref(db, `notes/${id}`), { color: c });
            };

            // 드래그/리사이즈 통합 로직
            note.onmousedown = (e) => {
                if (e.target.tagName === 'TEXTAREA' || e.target.closest('.note-controls')) return;
                e.stopPropagation();
                
                document.querySelectorAll('.note').forEach(n => n.classList.remove('selected'));
                note.classList.add('selected');

                const isResize = e.target.classList.contains('resizer');
                let sX = e.clientX, sY = e.clientY;
                let sL = note.offsetLeft, sT = note.offsetTop;
                let sW = note.offsetWidth, sH = note.offsetHeight;

                const move = (me) => {
                    if(isResize) {
                        const nw = Math.max(280, sW + (me.clientX - sX));
                        const nh = Math.max(200, sH + (me.clientY - sY));
                        note.style.width = nw + 'px'; note.style.height = nh + 'px';
                        update(ref(db, `notes/${id}`), { w: nw, h: nh });
                    } else {
                        const nx = sL + (me.clientX - sX);
                        const ny = sT + (me.clientY - sY);
                        note.style.left = nx + 'px'; note.style.top = ny + 'px';
                        update(ref(db, `notes/${id}`), { x: nx, y: ny });
                    }
                };
                const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
            };

            note.querySelector('textarea').oninput = (e) => update(ref(db, `notes/${id}`), { text: e.target.value });
        }

        if (note.classList.contains('selected') && (document.activeElement === note.querySelector('textarea'))) {
            // 입력 중일 때는 위치 업데이트만 반영하고 텍스트 덮어쓰기 방지 (선택사항)
        }

        note.style.left = data.x + 'px';
        note.style.top = data.y + 'px';
        note.style.width = (data.w || 280) + 'px';
        note.style.height = (data.h || 200) + 'px';
        note.style.backgroundColor = data.color || '#ffffff';
        note.querySelector('textarea').value = data.text || "";
    }

    document.getElementById('add-note').onclick = () => {
        push(notesRef, { x: -offX + 100, y: -offY + 100, w: 280, h: 200, text: "", author: myName, color: "#ffffff" });
    };

    onChildAdded(notesRef, s => renderNote(s.key, s.val()));
    onChildChanged(notesRef, s => renderNote(s.key, s.val()));
    onChildRemoved(notesRef, s => document.querySelector(`.note[data-id="${s.key}"]`)?.remove());
</script>
</body>
</html>
